<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin — Vandalize</title>
  <link rel="stylesheet" href="../src/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">VANDALIZE</div>
      <p class="login-sub">PAINEL EDITORIAL</p>

      <form id="login-form">
        <div class="form-group" style="margin-bottom:1rem;">
          <label class="form-label" for="email">E-MAIL</label>
          <input type="email" id="email" class="form-input" placeholder="seuemailaqui@vandalize.com" required />
        </div>

        <div class="form-group" style="margin-bottom:2rem;">
          <label class="form-label" for="senha">SENHA</label>
          <input type="password" id="senha" class="form-input" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
          ENTRAR →
        </button>

        <p id="login-erro" style="color:#E03C2C;font-size:0.82rem;text-align:center;margin-top:1rem;"></p>
      </form>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
