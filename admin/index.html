<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Vandalize</title>
  <link rel="stylesheet" href="../src/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">VANDALIZE</div>
    <p class="login-sub">PAINEL EDITORIAL</p>

    <div class="form-group" style="margin-bottom:1rem;">
      <label class="form-label">USUÁRIO</label>
      <input type="text" id="loginUser" class="form-input" placeholder="admin" />
    </div>
    <div class="form-group" style="margin-bottom:2rem;">
      <label class="form-label">SENHA</label>
      <input type="password" id="loginPass" class="form-input" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn">ENTRAR →</button>
    <p id="loginError" style="color:#E03C2C;font-size:0.82rem;text-align:center;margin-top:1rem;display:none;">Usuário ou senha incorretos.</p>
  </div>
</div>

<script>
  // Check already logged in
  if (localStorage.getItem('vandalize_admin') === 'true') {
    window.location.href = 'painel.html';
  }

  document.getElementById('loginBtn').addEventListener('click', () => {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    // Default credentials — change here
    if (user === 'admin' && pass === 'vandalize2026') {
      localStorage.setItem('vandalize_admin', 'true');
      window.location.href = 'painel.html';
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  });

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });
</script>
</body>
</html>
